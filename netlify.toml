# Static site: no build step. Netlify serves files from the repo root.
[build]
  publish = "."

# Browsers auto-request /favicon.ico from the root; serve the SVG there so the
# legacy probe resolves (200) instead of 404ing.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
